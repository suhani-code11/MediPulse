<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MediPulse - Patient Vitals</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">
<div class="bg-white p-8 rounded shadow-md w-full max-w-md">
  <h1 class="text-2xl font-bold mb-4 text-center text-blue-600">Check Your Vitals</h1>
  <form action="/check" method="POST" class="space-y-4">
    <div>
      <label class="block mb-1 font-medium">Heart Rate (bpm)</label>
      <input type="number" name="heart_rate" class="w-full px-3 py-2 border rounded" required>
    </div>
    <div>
      <label class="block mb-1 font-medium">SpO₂ (%)</label>
      <input type="number" name="spo2" class="w-full px-3 py-2 border rounded" required>
    </div>
    <div>
      <label class="block mb-1 font-medium">Temperature (°C)</label>
      <input type="number" step="0.1" name="temperature" class="w-full px-3 py-2 border rounded" required>
    </div>
    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Check</button>
  </form>
</div>
</body>

  <input type="text" name="heart_rate" placeholder="Heart Rate" value="90">
  <input type="text" name="spo2" placeholder="SpO₂" value="90">
  <input type="text" name="temperature" placeholder="Temperature" value="90">

    <div id="result" style="display:none; margin-top:20px;">
        <h3>Status: <span id="status"></span></h3>
        <p id="abnormal"></p>
        <ul id="tips"></ul>
    </div>

<script>
document.getElementById('vitalsForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const formData = new FormData(e.target);

    const response = await fetch('/check', {
        method: 'POST',
        body: formData
    });

    const data = await response.json();

    document.getElementById('result').style.display = 'block';
    document.getElementById('status').textContent = data.status;

    if (data.abnormal.length > 0) {
        document.getElementById('abnormal').textContent =
            "Abnormal Vitals: " + data.abnormal.join(", ");
    } else {
        document.getElementById('abnormal').textContent =
            "All vitals are normal.";
    }

    const tipsList = document.getElementById('tips');
    tipsList.innerHTML = "";
    data.tips.forEach(tip => {
        const li = document.createElement('li');
        li.textContent = tip;
        tipsList.appendChild(li);
    });
});
</script>
</body>
</html>
