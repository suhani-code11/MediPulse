<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Health Tips & Recommendations</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background: #f0f4f8; }
.card { margin-bottom: 15px; }
</style>
</head>
<body>
<div class="container py-4">
  <h1 class="text-center mb-4">🌟 Health Tips & Recommendations</h1>
  <div class="row">
    {% for tip in tips %}
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-body">
          <p>{{ tip }}</p>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
  <div class="text-center mt-4">
    <a href="/" class="btn btn-primary">⬅ Back to Home</a>
  </div>
  <div class="text-center mt-4">
  <button onclick="history.back()" class="btn btn-primary">⬅ Back to Report</button>
  </div>



</div>
</body>
</html>
